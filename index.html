<!DOCTYPE html>
<html>
<head>
    <title>Busca Simples</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .logo {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .search-box {
            width: 80%;
            max-width: 500px;
            padding: 15px;
            border-radius: 25px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 16px;
        }

        .btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: #4285f4;
            color: white;
            cursor: pointer;
        }

        .btn:hover {
            background: #3367d6;
        }

        /* imagem fullscreen */
        .fixa {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <div id="tela">
        <div class="logo">🔎 Busca</div>
        <input class="search-box" placeholder="Pesquisar...">
        <button class="btn" onclick="iniciar()">Pesquisar</button>
    </div>

    <audio id="som" src="passaro-branco.mp3"></audio>

    <script>
        function iniciar() {

            document.body.innerHTML = "<h1>Carregando resultados...</h1>";

            setTimeout(() => {

                document.body.innerHTML = `
                    <img class="fixa" src="xvideos.jpg">
                `;

                new Audio("passaro-branco.mp3").play();

            }, 2000);
        }
    </script>

</body>
</html>
