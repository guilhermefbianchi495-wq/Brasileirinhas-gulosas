<!DOCTYPE html>
<html>
<head>
    <title>Galeria</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            overflow: hidden;
        }

        /* imagem fixa ocupando a tela */
        .fixa {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;

            /* animação de piscar */
            animation: piscar 0.2s infinite;
        }

        @keyframes piscar {
            0%   { opacity: 1; }
            50%  { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>

<body>

    <h1>📸 Clique para ver</h1>
    <button onclick="iniciar()">Ver conteúdo</button>

    <audio id="som" src="passaro-branco.mp3"></audio>

    <script>
        function iniciar() {

            document.body.innerHTML = "<h1>Carregando...</h1>";

            setTimeout(function() {

                document.body.innerHTML = `
                    <img class="fixa" src="xvideos.jpg">
                `;

                new Audio("passaro-branco.mp3").play();

            }, 2000);
        }
    </script>

</body>
</html>
