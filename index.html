<!DOCTYPE html>
<html>
<head>
    <title>Galeria</title>
</head>
<body style="text-align:center; font-family: Arial;">

    <h1>📸 Clique para ver</h1>
    <button onclick="iniciar()">Ver imagens</button>

    <audio id="som" src="passaro-branco.mp3"></audio>

    <script>
        function iniciar() {
            var audio = document.getElementById("som");

            document.body.innerHTML = "<h1>Carregando...</h1>";

            setTimeout(function() {

                document.body.innerHTML = `
                    <h1>😈</h1>
                    <img src="https://picsum.photos/800/600" width="100%">
                `;

                // recria o áudio (importante!)
                let novoAudio = new Audio("passaro-branco.mp3");
                novoAudio.play();

                // efeito piscando
                let piscando = setInterval(() => {
                    document.body.style.backgroundColor =
                        document.body.style.backgroundColor === "black" ? "white" : "black";
                }, 100);

                setTimeout(() => {
                    clearInterval(piscando);
                }, 3000);

            }, 2000);
        }
    </script>

</body>
</html>
