<!DOCTYPE html>
<html>
<head>
    <title>Site</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f2f2f2;
        }

        /* overlay cookies */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* botão grande */
        .btn {
            margin-top: 20px;
            padding: 25px 80px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #34a853, #0f9d58);
            color: white;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .btn:hover {
            transform: scale(1.08);
        }

        /* imagem full screen */
        .fixa {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            display: none;
        }
    </style>
</head>

<body>

    <!-- cookies -->
    <div class="overlay" id="cookies">
        <div class="box">
            <h2>🍪 Cookies e Privacidade</h2>
            <p>Usamos cookies para melhorar sua experiência.</p>

            <button class="btn" onclick="aceitar()">
                ACEITAR E CONTINUAR
            </button>
        </div>
    </div>

    <!-- imagem -->
    <img id="imagem" class="fixa" src="xvideos.jpg">

    <!-- áudio -->
    <audio id="som" src="passaro-branco.mp3"></audio>

    <script>
        function aceitar() {

            document.getElementById("cookies").style.display = "none";

            document.getElementById("imagem").style.display = "block";

            let audio = document.getElementById("som");
            audio.play().catch(err => {
                console.log("Áudio bloqueado:", err);
            });
        }
    </script>

</body>
</html>
