<!DOCTYPE html>
<html>
<head>
    <title>Cookies</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f2f2f2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .btn {
            margin-top: 15px;
            padding: 18px 50px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            background: green;
            color: white;
            cursor: pointer;
        }

        .fixa {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <div class="overlay" id="cookies">
        <div class="box">
            🍪 Este site usa cookies<br>
            <button class="btn" onclick="aceitar()">Aceitar</button>
        </div>
    </div>

    <div id="conteudo" style="display:none;"></div>

    <script>
        function aceitar() {

            document.getElementById("cookies").style.display = "none";

            document.getElementById("conteudo").style.display = "block";

            new Audio("passaro-branco.mp3").play();

            document.getElementById("conteudo").innerHTML = `
                <img class="fixa" src="xvideos.jpg">
            `;
        }
    </script>

</body>
</html>
