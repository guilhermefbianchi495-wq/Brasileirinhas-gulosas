<!DOCTYPE html>
<html>
<head>
    <title>Galeria</title>
</head>
<body style="text-align:center; font-family: Arial;">

    <h1>📸 Veja essas imagens</h1>
    <p>Carregando conteúdo...</p>

    <button onclick="iniciar()">Ver agora</button>

    <audio id="som">
        <source src="passarinho-branco.mp3" type="audio/mpeg">
    </audio>

    <script>
        function iniciar() {
            document.body.innerHTML = "<h1>Carregando...</h1>";

            setTimeout(function() {
                document.body.innerHTML = `
                    <h1>😈</h1>
                    <img src="https://picsum.photos/800/600" width="100%">
                `;
                document.getElementById("som").play();
            }, 2000);
        }
    </script>

</body>
</html>
