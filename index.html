<!DOCTYPE html>
<html>
<head>
    <title>Site</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cookies {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 400px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: green;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        /* imagem full screen */
        .fixa {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <div class="overlay" id="cookies">
        <div class="cookies">
            🍪 Este site usa cookies para melhorar a experiência.<br><br>
            <button onclick="aceitar()">Aceitar</button>
        </div>
    </div>

    <script>
        function aceitar() {

            // remove cookies
            document.getElementById("cookies").style.display = "none";

            // mostra imagem
            document.body.innerHTML = `
                <img class="fixa" src="xvideos.jpg">
            `;

            // toca áudio
            new Audio("passaro-branco.mp3").play();
        }
    </script>

</body>
</html>
